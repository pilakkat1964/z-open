baseurl: /z-open
theme: jekyll-theme-architect
title: Z-Open
description: "Smart file opener \u2014 opens files with the right application based\
  \ on MIME type or extension"
show_downloads: true
github:
  repository_url: https://github.com/pilakkat1964/z-open
  owner_name: pilakkat1964
  owner_url: https://github.com/pilakkat1964
plugins:
- jekyll-feed
- jekyll-relative-links
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
permalink: /:title/
defaults:
- scope:
    path: ''
  values:
    layout: default
relative_links:
  collections: true
keep_files:
- .git
- .github
exclude:
- Makefile
- .gitignore
- .github
- README.md
- DEVELOPMENT.md
parent_url: /z-tools
hierarchy_level: 2
hierarchy_parent_title: Z-Tools Portfolio

