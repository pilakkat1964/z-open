{% if page.parent_url %}
  <!-- Site Hierarchy Navigation -->
  <nav class="site-hierarchy-nav">
    <div class="hierarchy-breadcrumb">
      <a href="{{ page.parent_url | relative_url }}" title="Up to {{ page.hierarchy_parent_title }}">
        ↑ Up to {{ page.hierarchy_parent_title }}
      </a>
    </div>
  </nav>
  <style>
    .site-hierarchy-nav {
      background-color: #f5f5f5;
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      padding: 8px 15px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .hierarchy-breadcrumb a {
      color: #0366d6;
      text-decoration: none;
    }
    .hierarchy-breadcrumb a:hover {
      text-decoration: underline;
    }
  </style>
{% endif %}
