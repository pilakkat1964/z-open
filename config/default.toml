".tsx"   = "$EDITOR"
".jsx"   = "$EDITOR"
".html"  = "$EDITOR"
".htm"   = "$EDITOR"
".css"   = "$EDITOR"
".scss"  = "$EDITOR"
".sass"  = "$EDITOR"
".less"  = "$EDITOR"
".json"  = "$EDITOR"
".jsonc" = "$EDITOR"
".xml"   = "$EDITOR"
".yaml"  = "$EDITOR"
".yml"   = "$EDITOR"
".toml"  = "$EDITOR"
".ini"   = "$EDITOR"
".cfg"   = "$EDITOR"
".conf"  = "$EDITOR"
".sh"    = "$EDITOR"
".bash"  = "$EDITOR"
".zsh"   = "$EDITOR"
".fish"  = "$EDITOR"
".c"     = "$EDITOR"
".h"     = "$EDITOR"
".cpp"   = "$EDITOR"
".cc"    = "$EDITOR"
".cxx"   = "$EDITOR"
".hpp"   = "$EDITOR"
".hxx"   = "$EDITOR"
".rs"    = "$EDITOR"
".go"    = "$EDITOR"
".java"  = "$EDITOR"
".kt"    = "$EDITOR"
".rb"    = "$EDITOR"
".php"   = "$EDITOR"
".sql"   = "$EDITOR"
".tf"    = "$EDITOR"
".lua"   = "$EDITOR"
".r"     = "$EDITOR"
".R"     = "$EDITOR"
".swift" = "$EDITOR"
".dart"  = "$EDITOR"

# Documents
".pdf"   = "evince"
".ps"    = "evince"
".eps"   = "evince"
".doc"   = "libreoffice --writer"
".docx"  = "libreoffice --writer"
".odt"   = "libreoffice --writer"
".rtf"   = "libreoffice --writer"
".xls"   = "libreoffice --calc"
".xlsx"  = "libreoffice --calc"
".ods"   = "libreoffice --calc"
".csv"   = "libreoffice --calc"
".ppt"   = "libreoffice --impress"
".pptx"  = "libreoffice --impress"
".odp"   = "libreoffice --impress"

# Images
".png"   = "eog"
".jpg"   = "eog"
".jpeg"  = "eog"
".gif"   = "eog"
".webp"  = "eog"
".bmp"   = "eog"
".tiff"  = "eog"
".tif"   = "eog"
".ico"   = "eog"
".heic"  = "eog"
".heif"  = "eog"
