".txt"   = "$EDITOR"
".md"    = "$EDITOR"
".rst"   = "$EDITOR"
".py"    = "$EDITOR"
".pyi"   = "$EDITOR"
".js"    = "$EDITOR"
".mjs"   = "$EDITOR"
".cjs"   = "$EDITOR"
