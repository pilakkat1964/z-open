# Audio
".mp3"   = "rhythmbox"
".ogg"   = "rhythmbox"
".flac"  = "rhythmbox"
".wav"   = "rhythmbox"
".m4a"   = "rhythmbox"
".aac"   = "rhythmbox"
".wma"   = "rhythmbox"
".opus"  = "rhythmbox"

# Video
