name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git archive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake python3-magic

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_INSTALL_PREFIX=/opt/zopen

      - name: Build install archive (TGZ)
        run: |
          cmake --build build --target tarball
          ls build/zopen-*.tar.gz

      - name: Build source archive (TGZ)
        run: |
          git archive --format=tar.gz \
            --prefix="zopen-${{ steps.version.outputs.VERSION }}-source/" \
            -o "zopen-${{ steps.version.outputs.VERSION }}-source.tar.gz" \
            HEAD

      - name: Collect assets
        id: assets
        run: |
          INSTALL_TGZ=$(ls build/zopen-*.tar.gz)
          SOURCE_TGZ="zopen-${{ steps.version.outputs.VERSION }}-source.tar.gz"
          echo "INSTALL_TGZ=${INSTALL_TGZ}" >> "$GITHUB_OUTPUT"
          echo "SOURCE_TGZ=${SOURCE_TGZ}"   >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "zopen ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.INSTALL_TGZ }}
            ${{ steps.assets.outputs.SOURCE_TGZ }}
