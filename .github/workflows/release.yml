name: Release

on:
  # Automatically trigger on version tags (v0.0.0, v1.2.3, etc.)
  push:
    tags:
      - 'v*'
  
  # Allow manual triggering from GitHub Actions UI
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v0.6.5)'
        required: true
        default: 'v0.6.5'

permissions:
  contents: write   # needed to create GitHub releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git archive
      
      # For manual dispatch, checkout the specified tag
      - name: Checkout tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch origin "${{ github.event.inputs.version }}"
          git checkout "${{ github.event.inputs.version }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake python3-magic dpkg-dev

      - name: Extract version from tag
        id: version
        run: |
          VERSION_TAG="${{ github.event.inputs.version || github.ref_name }}"
          echo "VERSION=${VERSION_TAG#v}" >> "$GITHUB_OUTPUT"
          echo "TAG=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_INSTALL_PREFIX=/opt/zopen -DZOPEN_BUILD_WHEEL=OFF

      - name: Build install archive (TGZ)
        run: |
          cmake --build build --target tarball
          ls build/zopen-*.tar.gz

      - name: Build Debian package (multiarch)
        id: build_deb
        run: |
          cmake --build build --target deb
          
          DEB_FILE=$(ls build/zopen-*.deb | head -1)
          if [ -z "$DEB_FILE" ]; then
            echo "Debian package creation failed"
            exit 1
          fi
          
          # Verify Architecture: any in package
          ARCH=$(dpkg -I "$DEB_FILE" | grep "Architecture:" | awk '{print $2}')
          echo "Package architecture: $ARCH"
          if [ "$ARCH" != "any" ]; then
            echo "ERROR: Package architecture should be 'any', but got '$ARCH'"
            exit 1
          fi
          
          # Rename to indicate multiarch support
          DEB_RENAMED="${DEB_FILE%.*}-multiarch.deb"
          mv "$DEB_FILE" "$DEB_RENAMED"
          
          echo "deb-package=$(basename $DEB_RENAMED)" >> "$GITHUB_OUTPUT"
          ls -lh "$DEB_RENAMED"
          
          dpkg -I "$DEB_RENAMED"

      - name: Build source archive
        run: |
          git archive --format=tar.gz \
            --prefix="zopen-${{ steps.version.outputs.VERSION }}-source/" \
            -o "zopen-${{ steps.version.outputs.VERSION }}-source.tar.gz" \
            HEAD

      - name: Collect assets
        id: assets
        run: |
          INSTALL_TGZ=$(ls build/zopen-*.tar.gz)
          DEB=$(ls build/zopen-*-multiarch.deb)
          SOURCE_TGZ="zopen-${{ steps.version.outputs.VERSION }}-source.tar.gz"
          echo "INSTALL_TGZ=${INSTALL_TGZ}" >> "$GITHUB_OUTPUT"
          echo "DEB=${DEB}"                 >> "$GITHUB_OUTPUT"
          echo "SOURCE_TGZ=${SOURCE_TGZ}"   >> "$GITHUB_OUTPUT"
          
          # Log asset information
          echo "Release Assets:"
          echo "  Install TGZ: ${INSTALL_TGZ}"
          echo "  Debian DEB: ${DEB}"
          echo "  Source TGZ: ${SOURCE_TGZ}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "zopen ${{ steps.version.outputs.TAG }}"
          tag_name: ${{ steps.version.outputs.TAG }}
          generate_release_notes: true
          files: |
            ${{ steps.assets.outputs.INSTALL_TGZ }}
            ${{ steps.assets.outputs.DEB }}
            ${{ steps.assets.outputs.SOURCE_TGZ }}
