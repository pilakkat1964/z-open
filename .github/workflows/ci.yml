name: CI

on:
  push:
    branches:
      - master
      - 'feature/**'
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check if zopen.py is valid Python
        run: |
          python -m py_compile zopen.py
          echo "✓ zopen.py compiles successfully"

      - name: Import and version check
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from zopen import __version__; print(f'Z-Open version: {__version__}')"
          python -c "import sys; sys.path.insert(0, '.'); import zopen; print('✓ zopen module imports successfully')"

      - name: Test help command
        run: |
          python zopen.py --help
          python zopen.py --version

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run ruff check (linting)
        run: |
          ruff check zopen.py --config pyproject.toml
          echo "✓ Code style check passed"

      - name: Run ruff format check (formatting)
        run: |
          ruff format --check zopen.py --config pyproject.toml
          echo "✓ Code format check passed"

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit

      - name: Run bandit security scan
        run: |
          bandit -r zopen.py -f json -o /tmp/bandit-report.json || true
          bandit -r zopen.py -f txt
          echo "✓ Security scan complete"

  config-validation:
    name: Configuration Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate configuration files
        run: |
          python zopen.py config list
          python zopen.py mime list
          python zopen.py app list
          echo "✓ Configuration validation passed"

  build:
    name: Build Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake python3-magic dpkg-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_INSTALL_PREFIX=/opt/zopen

      - name: Build Debian package
        run: |
          cmake --build build --target deb
          ls -lh build/zopen-*.deb
          echo "✓ DEB package built successfully"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/zopen-*.deb
          retention-days: 7

  all-checks-pass:
    name: All Checks Pass
    runs-on: ubuntu-latest
    needs: [test, lint, security, config-validation, build]
    if: always()

    steps:
      - name: Decide whether all checks passed
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.config-validation.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Some checks failed"
            exit 1
          fi
          echo "✓ All checks passed!"
