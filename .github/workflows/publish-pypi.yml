name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    environment:
      name: pypi
      url: https://pypi.org/project/zopen

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution packages
        run: |
          python -m build
          ls -lh dist/

      - name: Verify package metadata
        run: |
          twine check dist/*
          echo ""
          echo "Built packages:"
          ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          verbose: true

      - name: Verify publication
        run: |
          echo "Package published! Check at:"
          echo "https://pypi.org/project/zopen/"
          sleep 5
          pip install --upgrade zopen
          python -c "import zopen; print(f'zopen {zopen.APP_VERSION} installed successfully')" || echo "Verification script (expected to fail in CI context)"
